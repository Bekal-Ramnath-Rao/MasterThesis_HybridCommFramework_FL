  # ============================================================================
  # DDS Discovery Server (unicast peer on 127.0.0.1:7410)
  # ============================================================================
  dds-discovery-emotion:
    build:
      context: ..
      dockerfile: Server/Dockerfile
    network_mode: host
    environment:
      - DDS_DOMAIN_ID=0
      - CYCLONEDDS_URI=file:///app/config/cyclonedds-discovery-server.xml
    volumes:
      - ../config:/app/config:ro
    container_name: dds-discovery-emotion
    command: python -u scripts/dds_discovery_server.py
    # Start before DDS server and clients

  # ============================================================================
  # DDS Protocol Services (Discovery at 127.0.0.1:7410; server 7412, client1 7414, client2 7416)
  # For multi-machine static unicast (129.69.102.x lab), use docker run --network host with
  # DDS_PEER_* from config/dds_distributed_env.sh / Server+Client Dockerfiles — do not use this
  # localhost discovery block.
  # ============================================================================
  fl-server-dds-emotion:
    build:
      context: ..
      dockerfile: Server/Dockerfile
    network_mode: host
    environment:
      - PROTOCOL=DDS
      - USE_CASE=emotion
      - NUM_ROUNDS=${NUM_ROUNDS:-1000}
      - NETWORK_SCENARIO=${NETWORK_SCENARIO:-default}
      - STOP_ON_CLIENT_CONVERGENCE=${STOP_ON_CLIENT_CONVERGENCE:-true}
      - TRAINING_TERMINATION_MODE=${TRAINING_TERMINATION_MODE:-}
      - FL_DIAGNOSTIC_PIPELINE=${FL_DIAGNOSTIC_PIPELINE:-0}
      - MIN_CLIENTS=${MIN_CLIENTS:-2}
      - MAX_CLIENTS=${MAX_CLIENTS:-100}
      - CUDA_VISIBLE_DEVICES=
      - LOCAL_EPOCHS=20
      - DDS_DOMAIN_ID=0
      - CYCLONEDDS_URI=file:///app/config/cyclonedds-emotion-server.xml
      - ROS_DISCOVERY_SERVER=127.0.0.1:7410
      - DDS_USE_PRIMITIVE_CONFIG=1
      - USE_QUANTIZATION=${USE_QUANTIZATION:-false}
      - QUANTIZATION_STRATEGY=${QUANTIZATION_STRATEGY:-parameter_quantization}
      - QUANTIZATION_BITS=${QUANTIZATION_BITS:-8}
      - QUANTIZATION_SYMMETRIC=${QUANTIZATION_SYMMETRIC:-true}
      - QUANTIZATION_PER_CHANNEL=${QUANTIZATION_PER_CHANNEL:-false}
    cap_add:
      - NET_ADMIN
    volumes:
      - ../config:/app/config:ro
      - ../Server/Emotion_Recognition/results:/app/Server/Emotion_Recognition/results
    depends_on:
      - dds-discovery-emotion
    container_name: fl-server-dds-emotion
    command: bash -c "sleep 15 && python -u Server/Emotion_Recognition/FL_Server_DDS.py"


# Docker Compose - Emotion FL with network_mode: host (high-performance, no bridge latency)
# Use this to avoid Docker bridge and reduce DDS/HTTP3 latency deviations.
# All services share the host network: use unique ports per process to avoid conflicts.
# Port assignment:
#   MQTT: broker 1883, 9001
#   AMQP: broker 5672, 15672
#   gRPC: server 50051
#   QUIC: server 4433
#   HTTP/3: server 4434
#   DDS Discovery: 7410 (participant 0), server 7412 (1), client1 7414 (2), client2 7416 (3)
# Connect to servers/brokers via 127.0.0.1 (localhost) when using host network.

services:
  # ============================================================================
  # MQTT Broker (host network: binds 1883, 9001 on host)
  # ============================================================================
  mqtt-broker:
    image: eclipse-mosquitto:latest
    network_mode: host
    volumes:
      - ../mqtt-config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    container_name: mqtt-broker
    # Ensure Mosquitto listens on 0.0.0.0 in mosquitto.conf when using host mode

  # ============================================================================
  # MQTT Protocol Services
  # ============================================================================
  fl-server-mqtt-emotion:
    build:
      context: ..
      dockerfile: Server/Dockerfile
    network_mode: host
    environment:
      - PROTOCOL=MQTT
      - USE_CASE=emotion
      - MQTT_BROKER=127.0.0.1
      - MQTT_PORT=1883
      - NUM_ROUNDS=${NUM_ROUNDS:-1000}
      - NETWORK_SCENARIO=${NETWORK_SCENARIO:-default}
      - STOP_ON_CLIENT_CONVERGENCE=${STOP_ON_CLIENT_CONVERGENCE:-true}
      - TRAINING_TERMINATION_MODE=${TRAINING_TERMINATION_MODE:-}
      - FL_DIAGNOSTIC_PIPELINE=${FL_DIAGNOSTIC_PIPELINE:-0}
      - MIN_CLIENTS=${MIN_CLIENTS:-2}
      - MAX_CLIENTS=${MAX_CLIENTS:-100}
      - CUDA_VISIBLE_DEVICES=
      - USE_QUANTIZATION=${USE_QUANTIZATION:-false}
      - QUANTIZATION_STRATEGY=${QUANTIZATION_STRATEGY:-parameter_quantization}
      - QUANTIZATION_BITS=${QUANTIZATION_BITS:-8}
      - QUANTIZATION_SYMMETRIC=${QUANTIZATION_SYMMETRIC:-true}
      - QUANTIZATION_PER_CHANNEL=${QUANTIZATION_PER_CHANNEL:-false}
    cap_add:
      - NET_ADMIN
    volumes:
      - ../Server/Emotion_Recognition/packet_logger.db:/app/Server/Emotion_Recognition/packet_logger.db
    depends_on:
      - mqtt-broker
    container_name: fl-server-mqtt-emotion
    command: python -u Server/Emotion_Recognition/FL_Server_MQTT.py

  fl-client-mqtt-emotion-1:
    build:
      context: ..
      dockerfile: Client/Dockerfile
    network_mode: host
    environment:
      - CLIENT_ID=1
      - NUM_CLIENTS=2
      - STOP_ON_CLIENT_CONVERGENCE=${STOP_ON_CLIENT_CONVERGENCE:-true}
      - TRAINING_TERMINATION_MODE=${TRAINING_TERMINATION_MODE:-}
      - FL_DIAGNOSTIC_PIPELINE=${FL_DIAGNOSTIC_PIPELINE:-0}
      - PROTOCOL=MQTT
      - USE_CASE=emotion
      - MQTT_BROKER=127.0.0.1
      - MQTT_PORT=1883
      - CUDA_VISIBLE_DEVICES=0
      - GPU_DEVICE_ID=0
      - TF_FORCE_GPU_ALLOW_GROWTH=true
      - TF_GPU_MEMORY_FRACTION=0.9
      - USE_QUANTIZATION=${USE_QUANTIZATION:-false}
      - QUANTIZATION_STRATEGY=${QUANTIZATION_STRATEGY:-parameter_quantization}
      - QUANTIZATION_BITS=${QUANTIZATION_BITS:-8}
      - QUANTIZATION_SYMMETRIC=${QUANTIZATION_SYMMETRIC:-true}
      - QUANTIZATION_PER_CHANNEL=${QUANTIZATION_PER_CHANNEL:-false}
    cap_add:

    ports:
      - "35672:5672"
      - "35671:15672"
    networks:
      - temperature_network
    container_name: amqp-broker-temperature
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


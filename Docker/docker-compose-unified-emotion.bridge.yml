# Unified Emotion FL on Docker bridge (fl-network).
# MQTT/AMQP use mapped host ports (31883, 35672). gRPC/QUIC/HTTP3 use published ports.
#
# DDS (Cyclone): for the same reliable layout as fl-server-dds-emotion / fl-client-dds-emotion-*
# (network_mode: host, full UDP range), use Docker/docker-compose-unified-emotion.yml instead.
# run_network_experiments.py uses the host-network file for rl_unified so DDS works end-to-end.
#
# This file CAN be used for DDS with the following caveats and mitigations applied below:
#   - DDS_DISABLE_EXTERNAL_ADVERTISE=1 (default): prevents advertising the wrong lab LAN IP as
#     Cyclone's ExternalNetworkAddress to co-located bridge containers.
#   - DDS_SPDP_SERVER/CLIENT1 default to Docker service names so intra-bridge SPDP resolves via DNS.
#   - SPDP unicast ports (7412,7414,7416) AND user-data unicast ports (7413,7415,7417) are published
#     to the host so the server/clients can exchange both discovery and RTPS data traffic.
#   - Cross-machine DDS (client2 on another PC): set DDS_PEER_CLIENT2 to the remote PC's LAN IP,
#     set DDS_SPDP_CLIENT2 to the same IP, and open UDP 7416+7417 on the remote PC's firewall.
#     The server's RTPS data locator will be published on the host via port 7413; the remote client
#     must be able to reach that host IP:7413.  For simpler cross-machine DDS use the host-network
#     file (docker-compose-unified-emotion.yml) and set DDS_PEER_* to real LAN IPs.

services:
  mqtt-broker-unified:
    image: eclipse-mosquitto:latest
    container_name: mqtt-broker-unified
    ports:
      - "31883:1883"
      - "9001:9001"
    volumes:
      - ./mqtt-config:/mosquitto/config
    networks:
      - fl-network
    command: mosquitto -c /mosquitto/config/mosquitto.conf

  amqp-broker-unified:
    image: rabbitmq:3-management
    container_name: amqp-broker-unified
    ports:
      - "35672:5672"
      - "35671:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - fl-network

  fl-server-unified-emotion:
    build:
      context: ..
      dockerfile: Server/Dockerfile
    container_name: fl-server-unified-emotion
    environment:
      - NODE_TYPE=server
      - NUM_CLIENTS=2
      - NUM_ROUNDS=${NUM_ROUNDS:-1000}
      - NETWORK_SCENARIO=${NETWORK_SCENARIO:-default}
      - STOP_ON_CLIENT_CONVERGENCE=${STOP_ON_CLIENT_CONVERGENCE:-true}
      - TRAINING_TERMINATION_MODE=${TRAINING_TERMINATION_MODE:-}
      - MIN_CLIENTS=${MIN_CLIENTS:-2}
      - MAX_CLIENTS=${MAX_CLIENTS:-100}
      - MQTT_BROKER=mqtt-broker-unified
      - AMQP_BROKER=amqp-broker-unified
      - AMQP_HOST=amqp-broker-unified
      - GRPC_HOST=fl-server-unified-emotion
      - GRPC_PORT=50051
      - QUIC_HOST=0.0.0.0
      - QUIC_PORT=4433
      - HTTP3_HOST=0.0.0.0
      - HTTP3_PORT=4434
      - CONVERGENCE_THRESHOLD=0.001
      - CONVERGENCE_PATIENCE=2
      - MIN_ROUNDS=3
      - USE_QUANTIZATION=${USE_QUANTIZATION:-false}
      - QUANTIZATION_BITS=${QUANTIZATION_BITS:-8}
      - QUANTIZATION_STRATEGY=${QUANTIZATION_STRATEGY:-ptq}
      # DDS env — matches fl-server-dds-emotion layout.
      # DDS_SPDP_SERVER/CLIENT1 default to Docker service names for intra-bridge DNS resolution.
      # DDS_PEER_* hold the LAN IPs used for interface auto-detection and as fallback for SPDP.
      # DDS_DISABLE_EXTERNAL_ADVERTISE=1: server advertises its bridge-internal locator, not a
      # hardcoded lab IP — required for co-located containers to discover each other correctly.
      - DDS_PEER_SERVER=${DDS_PEER_SERVER:-129.69.102.245}
      - DDS_PEER_CLIENT1=${DDS_PEER_CLIENT1:-129.69.102.245}
      - DDS_PEER_CLIENT2=${DDS_PEER_CLIENT2:-129.69.102.173}
      - DDS_SPDP_SERVER=${DDS_SPDP_SERVER:-fl-server-unified-emotion}
      - DDS_SPDP_CLIENT1=${DDS_SPDP_CLIENT1:-fl-client-unified-emotion-1}
      - DDS_SPDP_CLIENT2=${DDS_SPDP_CLIENT2:-129.69.102.173}
      - DDS_DOMAIN_ID=0
      - DDS_DISABLE_EXTERNAL_ADVERTISE=${DDS_DISABLE_EXTERNAL_ADVERTISE:-1}
    volumes:
      - ../Server/Emotion_Recognition:/app/Server/Emotion_Recognition
      - ../experiment_results:/app/results
      - ../certs:/app/certs:ro
      - ../shared_data:/shared_data
    networks:
      - fl-network
    ports:
      - "4433:4433/udp"
      - "4434:4434/udp"
      - "50051:50051/tcp"
      - "7412:7412/udp"
      - "7413:7413/udp"
    depends_on:
      - mqtt-broker-unified
      - amqp-broker-unified
    cap_add:
      - NET_ADMIN
    command: python3 Server/Emotion_Recognition/FL_Server_Unified.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

  fl-client-unified-emotion-1:
    build:
      context: ..
      dockerfile: Client/Dockerfile
    container_name: fl-client-unified-emotion-1
    environment:
      - NODE_TYPE=client
      - CLIENT_ID=1
      - NUM_CLIENTS=2
      - NUM_ROUNDS=${NUM_ROUNDS:-1000}
      - NETWORK_SCENARIO=${NETWORK_SCENARIO:-default}
      - STOP_ON_CLIENT_CONVERGENCE=${STOP_ON_CLIENT_CONVERGENCE:-true}
      - TRAINING_TERMINATION_MODE=${TRAINING_TERMINATION_MODE:-}
      - USE_RL_SELECTION=true
      - USE_COMMUNICATION_MODEL_REWARD=${USE_COMMUNICATION_MODEL_REWARD:-true}
      - USE_QL_CONVERGENCE=${USE_QL_CONVERGENCE:-false}
      - USE_RL_EXPLORATION=${USE_RL_EXPLORATION:-}
      - Q_CONVERGENCE_THRESHOLD=${Q_CONVERGENCE_THRESHOLD:-0.01}
      - Q_CONVERGENCE_PATIENCE=${Q_CONVERGENCE_PATIENCE:-5}
      - RL_BOUNDARY_PIPELINE=${RL_BOUNDARY_PIPELINE:-true}
      - RL_PHASE0_ROUNDS=${RL_PHASE0_ROUNDS:-20}
      - RL_QTABLE_MERGE=${RL_QTABLE_MERGE:-false}
      - RL_QTABLE_OVERLAY_SCENARIOS=${RL_QTABLE_OVERLAY_SCENARIOS:-}
      - DEFAULT_PROTOCOL=mqtt
      - MQTT_BROKER=mqtt-broker-unified
      - AMQP_BROKER=amqp-broker-unified
      - AMQP_HOST=amqp-broker-unified
      - GRPC_HOST=fl-server-unified-emotion
      - GRPC_PORT=50051
      - QUIC_HOST=fl-server-unified-emotion
      - QUIC_PORT=4433
      - HTTP3_HOST=fl-server-unified-emotion
      - HTTP3_PORT=4434
      - USE_QUANTIZATION=${USE_QUANTIZATION:-false}
      - QUANTIZATION_BITS=${QUANTIZATION_BITS:-8}
      - QUANTIZATION_STRATEGY=${QUANTIZATION_STRATEGY:-ptq}
      - DDS_PEER_SERVER=${DDS_PEER_SERVER:-129.69.102.245}
      - DDS_PEER_CLIENT1=${DDS_PEER_CLIENT1:-129.69.102.245}
      - DDS_PEER_CLIENT2=${DDS_PEER_CLIENT2:-129.69.102.173}
      - DDS_SPDP_SERVER=${DDS_SPDP_SERVER:-fl-server-unified-emotion}
      - DDS_SPDP_CLIENT1=${DDS_SPDP_CLIENT1:-fl-client-unified-emotion-1}
      - DDS_SPDP_CLIENT2=${DDS_SPDP_CLIENT2:-129.69.102.173}
      - DDS_DOMAIN_ID=0
    volumes:
      - ../Client/Emotion_Recognition:/app/Client/Emotion_Recognition
      - ../Network_Simulation:/app/Network_Simulation:ro
      - ../shared_data:/shared_data
      - ../experiment_results:/app/results
      - ../certs:/app/certs:ro
    networks:
      - fl-network
    ports:
      - "7414:7414/udp"
      - "7415:7415/udp"
    depends_on:
      - fl-server-unified-emotion
      - mqtt-broker-unified
      - amqp-broker-unified
    cap_add:
      - NET_ADMIN
    command: python3 Client/Emotion_Recognition/FL_Client_Unified.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

  fl-client-unified-emotion-2:
    build:
      context: ..
      dockerfile: Client/Dockerfile
    container_name: fl-client-unified-emotion-2
    environment:
      - NODE_TYPE=client
      - CLIENT_ID=2
      - NUM_CLIENTS=2
      - NUM_ROUNDS=${NUM_ROUNDS:-1000}
      - NETWORK_SCENARIO=${NETWORK_SCENARIO:-default}
      - STOP_ON_CLIENT_CONVERGENCE=${STOP_ON_CLIENT_CONVERGENCE:-true}
      - TRAINING_TERMINATION_MODE=${TRAINING_TERMINATION_MODE:-}
      - USE_RL_SELECTION=true
      - USE_COMMUNICATION_MODEL_REWARD=${USE_COMMUNICATION_MODEL_REWARD:-true}
      - USE_QL_CONVERGENCE=${USE_QL_CONVERGENCE:-false}
      - USE_RL_EXPLORATION=${USE_RL_EXPLORATION:-}
      - Q_CONVERGENCE_THRESHOLD=${Q_CONVERGENCE_THRESHOLD:-0.01}
      - Q_CONVERGENCE_PATIENCE=${Q_CONVERGENCE_PATIENCE:-5}
      - RL_BOUNDARY_PIPELINE=${RL_BOUNDARY_PIPELINE:-true}
      - RL_PHASE0_ROUNDS=${RL_PHASE0_ROUNDS:-20}
      - RL_QTABLE_MERGE=${RL_QTABLE_MERGE:-false}
      - RL_QTABLE_OVERLAY_SCENARIOS=${RL_QTABLE_OVERLAY_SCENARIOS:-}
      - DEFAULT_PROTOCOL=mqtt
      - MQTT_BROKER=mqtt-broker-unified
      - AMQP_BROKER=amqp-broker-unified
      - AMQP_HOST=amqp-broker-unified
      - GRPC_HOST=fl-server-unified-emotion
      - GRPC_PORT=50051
      - QUIC_HOST=fl-server-unified-emotion
      - QUIC_PORT=4433
      - HTTP3_HOST=fl-server-unified-emotion
      - HTTP3_PORT=4434
      - USE_QUANTIZATION=${USE_QUANTIZATION:-false}
      - QUANTIZATION_BITS=${QUANTIZATION_BITS:-8}
      - QUANTIZATION_STRATEGY=${QUANTIZATION_STRATEGY:-ptq}
      - DDS_PEER_SERVER=${DDS_PEER_SERVER:-129.69.102.245}
      - DDS_PEER_CLIENT1=${DDS_PEER_CLIENT1:-129.69.102.245}
      - DDS_PEER_CLIENT2=${DDS_PEER_CLIENT2:-129.69.102.173}
      - DDS_SPDP_SERVER=${DDS_SPDP_SERVER:-fl-server-unified-emotion}
      - DDS_SPDP_CLIENT1=${DDS_SPDP_CLIENT1:-fl-client-unified-emotion-1}
      - DDS_SPDP_CLIENT2=${DDS_SPDP_CLIENT2:-129.69.102.173}
      - DDS_DOMAIN_ID=0
    volumes:
      - ../Client/Emotion_Recognition:/app/Client/Emotion_Recognition
      - ../Network_Simulation:/app/Network_Simulation:ro
      - ../shared_data:/shared_data
      - ../experiment_results:/app/results
      - ../certs:/app/certs:ro
    networks:
      - fl-network
    ports:
      - "7416:7416/udp"
      - "7417:7417/udp"
    depends_on:
      - fl-server-unified-emotion
      - mqtt-broker-unified
      - amqp-broker-unified
    cap_add:
      - NET_ADMIN
    command: python3 Client/Emotion_Recognition/FL_Client_Unified.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

networks:
  fl-network:
    driver: bridge

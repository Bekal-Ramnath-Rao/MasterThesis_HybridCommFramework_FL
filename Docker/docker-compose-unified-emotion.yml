services:
  # ============================================================================
  # BROKERS - Required for MQTT and AMQP protocols
  # ============================================================================
  
  mqtt-broker-unified:
    image: eclipse-mosquitto:latest
    container_name: mqtt-broker-unified
    # Host ports match docker-compose-emotion.gpu-isolated.yml (avoid 1883/5672 if already in use)
    ports:
      - "31883:1883"
      - "9001:9001"
    volumes:
      - ./mqtt-config:/mosquitto/config
    networks:
      - fl-network
    command: mosquitto -c /mosquitto/config/mosquitto.conf
  
  amqp-broker-unified:
    image: rabbitmq:3-management
    container_name: amqp-broker-unified
    ports:
      - "35672:5672"
      - "35671:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - fl-network
  
  # ============================================================================
  # UNIFIED FL SERVER - Handles all 5 protocols simultaneously
  # ============================================================================
  
  fl-server-unified-emotion:
    build:
      context: ..
      dockerfile: Server/Dockerfile
    container_name: fl-server-unified-emotion
    environment:
      - NODE_TYPE=server
      - NUM_CLIENTS=2
      - NUM_ROUNDS=${NUM_ROUNDS:-1000}
      - STOP_ON_CLIENT_CONVERGENCE=${STOP_ON_CLIENT_CONVERGENCE:-true}
      - TRAINING_TERMINATION_MODE=${TRAINING_TERMINATION_MODE:-}
      - MIN_CLIENTS=${MIN_CLIENTS:-2}
      - MAX_CLIENTS=${MAX_CLIENTS:-100}
      - MQTT_BROKER=mqtt-broker-unified
      - AMQP_BROKER=amqp-broker-unified
      - AMQP_HOST=amqp-broker-unified
      - GRPC_HOST=fl-server-unified-emotion
      - GRPC_PORT=50051
      - QUIC_HOST=0.0.0.0
      - QUIC_PORT=4433
      - HTTP3_HOST=0.0.0.0
      - HTTP3_PORT=4434
      - CONVERGENCE_THRESHOLD=0.001
      - CONVERGENCE_PATIENCE=2
      - MIN_ROUNDS=3
      - USE_QUANTIZATION=${USE_QUANTIZATION:-false}
      - QUANTIZATION_BITS=${QUANTIZATION_BITS:-8}
      - QUANTIZATION_STRATEGY=${QUANTIZATION_STRATEGY:-ptq}
      # DDS (Cyclone): DDS_PEER_* + DDS_SPDP_* must be reachable from every participant.
      # Defaults match docker-compose-emotion.yml (LAN IPs) so a client on *another PC* can discover the server.
      # If all containers run on one Docker bridge and you prefer internal DNS, override e.g.:
      #   DDS_SPDP_SERVER=fl-server-unified-emotion DDS_SPDP_CLIENT1=fl-client-unified-emotion-1
      # Publish UDP 7412/7414/7416 on the host firewall for remote peers (see FL_Server_Unified / FL_Client_DDS).
      - DDS_DOMAIN_ID=0
      - DDS_PEER_SERVER=${DDS_PEER_SERVER:-129.69.102.245}
      - DDS_PEER_CLIENT1=${DDS_PEER_CLIENT1:-129.69.102.245}
      - DDS_PEER_CLIENT2=${DDS_PEER_CLIENT2:-129.69.102.173}
      - DDS_SPDP_SERVER=${DDS_SPDP_SERVER:-129.69.102.245}
      - DDS_SPDP_CLIENT1=${DDS_SPDP_CLIENT1:-129.69.102.245}
      - DDS_SPDP_CLIENT2=${DDS_SPDP_CLIENT2:-129.69.102.173}
    volumes:
      - ../Server/Emotion_Recognition:/app/Server/Emotion_Recognition
      - ../experiment_results:/app/results
      - ../certs:/app/certs:ro
      - ../shared_data:/shared_data
    networks:
      - fl-network
    ports:
      - "4433:4433/udp"  # QUIC
      - "4434:4434/udp"  # HTTP/3 (QUIC)
      - "50051:50051/tcp"  # gRPC (HTTP/2)
      - "7412:7412/udp"  # CycloneDDS SPDP (participant index 1 = server); open on firewall for remote peers
    depends_on:
      - mqtt-broker-unified
      - amqp-broker-unified
    cap_add:
      - NET_ADMIN
    command: python3 Server/Emotion_Recognition/FL_Server_Unified.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
  
  # ============================================================================
  # UNIFIED FL CLIENTS - Use RL to select best protocol dynamically
  # ============================================================================
  
  fl-client-unified-emotion-1:
    build:
      context: ..
      dockerfile: Client/Dockerfile
    container_name: fl-client-unified-emotion-1
    environment:
      - NODE_TYPE=client
      - CLIENT_ID=1
      - NUM_CLIENTS=2
      - NUM_ROUNDS=${NUM_ROUNDS:-1000}
      - STOP_ON_CLIENT_CONVERGENCE=${STOP_ON_CLIENT_CONVERGENCE:-true}
      - TRAINING_TERMINATION_MODE=${TRAINING_TERMINATION_MODE:-}
      - USE_RL_SELECTION=true
      - USE_COMMUNICATION_MODEL_REWARD=${USE_COMMUNICATION_MODEL_REWARD:-true}
      - USE_QL_CONVERGENCE=${USE_QL_CONVERGENCE:-false}
      - USE_RL_EXPLORATION=${USE_RL_EXPLORATION:-}
      - Q_CONVERGENCE_THRESHOLD=${Q_CONVERGENCE_THRESHOLD:-0.01}
      - Q_CONVERGENCE_PATIENCE=${Q_CONVERGENCE_PATIENCE:-5}
      # Phase 1 collect rounds → Phase 2 boundaries → Phase 3 Q-learning (emotion unified training)
      - RL_BOUNDARY_PIPELINE=${RL_BOUNDARY_PIPELINE:-true}
      - RL_PHASE0_ROUNDS=${RL_PHASE0_ROUNDS:-20}
      # Parallel scenario training: RL_QTABLE_MERGE=1 + RL_QTABLE_OVERLAY_SCENARIOS=excellent (per stack)
      - RL_QTABLE_MERGE=${RL_QTABLE_MERGE:-false}
      - RL_QTABLE_OVERLAY_SCENARIOS=${RL_QTABLE_OVERLAY_SCENARIOS:-}
      - DEFAULT_PROTOCOL=mqtt
      - MQTT_BROKER=mqtt-broker-unified
      - AMQP_BROKER=amqp-broker-unified
      - AMQP_HOST=amqp-broker-unified
      - GRPC_HOST=fl-server-unified-emotion
      - GRPC_PORT=50051
      - QUIC_HOST=fl-server-unified-emotion
      - QUIC_PORT=4433
      - HTTP3_HOST=fl-server-unified-emotion
      - HTTP3_PORT=4434
      - USE_QUANTIZATION=${USE_QUANTIZATION:-false}
      - QUANTIZATION_BITS=${QUANTIZATION_BITS:-8}
      - QUANTIZATION_STRATEGY=${QUANTIZATION_STRATEGY:-ptq}
      - DDS_DOMAIN_ID=0
      - DDS_PEER_SERVER=${DDS_PEER_SERVER:-129.69.102.245}
      - DDS_PEER_CLIENT1=${DDS_PEER_CLIENT1:-129.69.102.245}
      - DDS_PEER_CLIENT2=${DDS_PEER_CLIENT2:-129.69.102.173}
      - DDS_SPDP_SERVER=${DDS_SPDP_SERVER:-129.69.102.245}
      - DDS_SPDP_CLIENT1=${DDS_SPDP_CLIENT1:-129.69.102.245}
      - DDS_SPDP_CLIENT2=${DDS_SPDP_CLIENT2:-129.69.102.173}
    volumes:
      - ../Client/Emotion_Recognition:/app/Client/Emotion_Recognition
      - ../Network_Simulation:/app/Network_Simulation:ro
      - ../shared_data:/shared_data
      - ../experiment_results:/app/results
      - ../certs:/app/certs:ro
    networks:
      - fl-network
    ports:
      - "7414:7414/udp"  # CycloneDDS SPDP (participant index 2 = client 1); map host IP for remote peer discovery
    depends_on:
      - fl-server-unified-emotion
      - mqtt-broker-unified
      - amqp-broker-unified
    cap_add:
      - NET_ADMIN
    command: python3 Client/Emotion_Recognition/FL_Client_Unified.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

  fl-client-unified-emotion-2:
    build:
      context: ..
      dockerfile: Client/Dockerfile
    container_name: fl-client-unified-emotion-2
    environment:
      - NODE_TYPE=client
      - CLIENT_ID=2
      - NUM_CLIENTS=2
      - NUM_ROUNDS=${NUM_ROUNDS:-1000}
      - STOP_ON_CLIENT_CONVERGENCE=${STOP_ON_CLIENT_CONVERGENCE:-true}
      - TRAINING_TERMINATION_MODE=${TRAINING_TERMINATION_MODE:-}
      - USE_RL_SELECTION=true
      - USE_COMMUNICATION_MODEL_REWARD=${USE_COMMUNICATION_MODEL_REWARD:-true}
      - USE_QL_CONVERGENCE=${USE_QL_CONVERGENCE:-false}
      - USE_RL_EXPLORATION=${USE_RL_EXPLORATION:-}
      - Q_CONVERGENCE_THRESHOLD=${Q_CONVERGENCE_THRESHOLD:-0.01}
      - Q_CONVERGENCE_PATIENCE=${Q_CONVERGENCE_PATIENCE:-5}
      # Phase 1 collect rounds → Phase 2 boundaries → Phase 3 Q-learning (emotion unified training)
      - RL_BOUNDARY_PIPELINE=${RL_BOUNDARY_PIPELINE:-true}
      - RL_PHASE0_ROUNDS=${RL_PHASE0_ROUNDS:-20}
      # Parallel scenario training: RL_QTABLE_MERGE=1 + RL_QTABLE_OVERLAY_SCENARIOS=excellent (per stack)
      - RL_QTABLE_MERGE=${RL_QTABLE_MERGE:-false}
      - RL_QTABLE_OVERLAY_SCENARIOS=${RL_QTABLE_OVERLAY_SCENARIOS:-}
      - DEFAULT_PROTOCOL=mqtt
      - MQTT_BROKER=mqtt-broker-unified
      - AMQP_BROKER=amqp-broker-unified
      - AMQP_HOST=amqp-broker-unified
      - GRPC_HOST=fl-server-unified-emotion
      - GRPC_PORT=50051
      - QUIC_HOST=fl-server-unified-emotion
      - QUIC_PORT=4433
      - HTTP3_HOST=fl-server-unified-emotion
      - HTTP3_PORT=4434
      - USE_QUANTIZATION=${USE_QUANTIZATION:-false}
      - QUANTIZATION_BITS=${QUANTIZATION_BITS:-8}
      - QUANTIZATION_STRATEGY=${QUANTIZATION_STRATEGY:-ptq}
      - DDS_DOMAIN_ID=0
      - DDS_PEER_SERVER=${DDS_PEER_SERVER:-129.69.102.245}
      - DDS_PEER_CLIENT1=${DDS_PEER_CLIENT1:-129.69.102.245}
      - DDS_PEER_CLIENT2=${DDS_PEER_CLIENT2:-129.69.102.173}
      - DDS_SPDP_SERVER=${DDS_SPDP_SERVER:-129.69.102.245}
      - DDS_SPDP_CLIENT1=${DDS_SPDP_CLIENT1:-129.69.102.245}
      - DDS_SPDP_CLIENT2=${DDS_SPDP_CLIENT2:-129.69.102.173}
    volumes:
      - ../Client/Emotion_Recognition:/app/Client/Emotion_Recognition
      - ../Network_Simulation:/app/Network_Simulation:ro
      - ../shared_data:/shared_data
      - ../experiment_results:/app/results
      - ../certs:/app/certs:ro
    networks:
      - fl-network
    ports:
      - "7416:7416/udp"  # CycloneDDS SPDP (participant index 3 = client 2)
    depends_on:
      - fl-server-unified-emotion
      - mqtt-broker-unified
      - amqp-broker-unified
    cap_add:
      - NET_ADMIN
    command: python3 Client/Emotion_Recognition/FL_Client_Unified.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

networks:
  fl-network:
    driver: bridge

# Unified Emotion FL — Docker with network_mode: host on all services.
#
# DDS matches docker-compose-emotion.yml (fl-server-dds-emotion / fl-client-dds-emotion-*):
# - network_mode: host, cap_add NET_ADMIN, DDS_DOMAIN_ID=0, same DDS_PEER_* / DDS_SPDP_*.
# - Do not set CYCLONEDDS_URI: config/dds_distributed_unicast.py writes
#   file:///tmp/cyclonedds-distributed-*.xml
#   SPDP ports domain 0: server PI1=7412, client1 PI2=7414, client2 PI3=7416, client3 PI4=7418.
# Cyclone RTPS needs the host UDP port range; Docker bridge + mapping only SPDP ports breaks DDS
# — use docker-compose-unified-emotion.bridge.yml only without DDS, or switch fully to this file.
# run_network_experiments.py selects this file for rl_unified in all network modes.
#
# Brokers listen on the host: MQTT 1883, AMQP 5672 (and 15672 for Rabbit UI). Server binds gRPC/QUIC/HTTP3
# on all interfaces; clients use UNIFIED_FL_SERVER_HOST for control/data plane (default 127.0.0.1).
#
# --- 3-PC distributed setup (192.168.0.x network) ---
# PC1 (server + client1): 192.168.0.102
# PC2 (client2, Windows):  192.168.0.100
# PC3 (client3, Linux):    192.168.0.101
#
# On the server PC (192.168.0.102), export before running:
#   export DDS_PEER_SERVER=192.168.0.102
#   export DDS_PEER_CLIENT1=192.168.0.102
#   export DDS_PEER_CLIENT2=192.168.0.100
#   export DDS_PEER_CLIENT3=192.168.0.101
#   export UNIFIED_FL_SERVER_HOST=192.168.0.102
#   docker compose -f Docker/docker-compose-unified-emotion.yml up -d \
#     mqtt-broker-unified amqp-broker-unified fl-server-unified-emotion fl-client-unified-emotion-1
#
# On remote PC2 (192.168.0.100) and PC3 (192.168.0.101), use distributed_client_gui.py and set:
#   Server IP: 192.168.0.102
#   DDS peers: server=192.168.0.102, client1=192.168.0.102, client2=192.168.0.100, client3=192.168.0.101
#   Client ID: 2 (PC2) or 3 (PC3), Total clients: 3
#
# Firewall rules on the server PC (must allow inbound from 192.168.0.100 and 192.168.0.101):
#   TCP: 1883 (MQTT), 5672 (AMQP), 50051 (gRPC)
#   UDP: 4433 (QUIC), 4434 (HTTP/3), 7400-7500 + 7412/7414/7416/7418 (DDS RTPS + SPDP)
#
# For an isolated bridge deployment (no host-wide ports; DDS may be unreliable), see
# docker-compose-unified-emotion.bridge.yml

services:
  mqtt-broker-unified:
    image: eclipse-mosquitto:latest
    container_name: mqtt-broker-unified
    network_mode: host
    volumes:
      - ./mqtt-config:/mosquitto/config
    command: mosquitto -c /mosquitto/config/mosquitto.conf

  amqp-broker-unified:
    image: rabbitmq:3-management
    container_name: amqp-broker-unified
    network_mode: host
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  fl-server-unified-emotion:
    build:
      context: ..
      dockerfile: Server/Dockerfile
    container_name: fl-server-unified-emotion
    network_mode: host
    environment:
      - NODE_TYPE=server
      - NUM_CLIENTS=${NUM_CLIENTS:-3}
      - NUM_ROUNDS=${NUM_ROUNDS:-1000}
      - NETWORK_SCENARIO=${NETWORK_SCENARIO:-default}
      - STOP_ON_CLIENT_CONVERGENCE=${STOP_ON_CLIENT_CONVERGENCE:-true}
      - TRAINING_TERMINATION_MODE=${TRAINING_TERMINATION_MODE:-}
      - MIN_CLIENTS=${MIN_CLIENTS:-2}
      - MAX_CLIENTS=${MAX_CLIENTS:-100}
      - MQTT_BROKER=127.0.0.1
      - AMQP_BROKER=127.0.0.1
      - AMQP_HOST=127.0.0.1
      - GRPC_HOST=0.0.0.0
      - GRPC_PORT=50051
      - QUIC_HOST=0.0.0.0
      - QUIC_PORT=4433
      - HTTP3_HOST=0.0.0.0
      - HTTP3_PORT=4434
      - CONVERGENCE_THRESHOLD=0.001
      - CONVERGENCE_PATIENCE=2
      - MIN_ROUNDS=3
      - USE_QUANTIZATION=${USE_QUANTIZATION:-false}
      - QUANTIZATION_BITS=${QUANTIZATION_BITS:-8}
      - QUANTIZATION_STRATEGY=${QUANTIZATION_STRATEGY:-ptq}
      # --- DDS (same order/env as fl-server-dds-emotion in docker-compose-emotion.yml) ---
      - DDS_PEER_SERVER=${DDS_PEER_SERVER:-192.168.0.102}
      - DDS_PEER_CLIENT1=${DDS_PEER_CLIENT1:-192.168.0.102}
      - DDS_PEER_CLIENT2=${DDS_PEER_CLIENT2:-192.168.0.100}
      - DDS_PEER_CLIENT3=${DDS_PEER_CLIENT3:-192.168.0.101}
      - DDS_SPDP_SERVER=${DDS_SPDP_SERVER:-}
      - DDS_SPDP_CLIENT1=${DDS_SPDP_CLIENT1:-}
      - DDS_SPDP_CLIENT2=${DDS_SPDP_CLIENT2:-}
      - DDS_SPDP_CLIENT3=${DDS_SPDP_CLIENT3:-}
      - DDS_DOMAIN_ID=0
    volumes:
      - ../Server/Emotion_Recognition:/app/Server/Emotion_Recognition
      - ../experiment_results:/app/results
      - ../certs:/app/certs:ro
      - ../shared_data:/shared_data
    depends_on:
      mqtt-broker-unified:
        condition: service_started
      amqp-broker-unified:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
    command: python3 Server/Emotion_Recognition/FL_Server_Unified.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

  fl-client-unified-emotion-1:
    build:
      context: ..
      dockerfile: Client/Dockerfile
    container_name: fl-client-unified-emotion-1
    network_mode: host
    environment:
      - NODE_TYPE=client
      - CLIENT_ID=1
      - NUM_CLIENTS=${NUM_CLIENTS:-3}
      - NUM_ROUNDS=${NUM_ROUNDS:-1000}
      - NETWORK_SCENARIO=${NETWORK_SCENARIO:-default}
      - STOP_ON_CLIENT_CONVERGENCE=${STOP_ON_CLIENT_CONVERGENCE:-true}
      - TRAINING_TERMINATION_MODE=${TRAINING_TERMINATION_MODE:-}
      - USE_RL_SELECTION=true
      - USE_COMMUNICATION_MODEL_REWARD=${USE_COMMUNICATION_MODEL_REWARD:-true}
      - USE_QL_CONVERGENCE=${USE_QL_CONVERGENCE:-false}
      - USE_RL_EXPLORATION=${USE_RL_EXPLORATION:-}
      - Q_CONVERGENCE_THRESHOLD=${Q_CONVERGENCE_THRESHOLD:-0.01}
      - Q_CONVERGENCE_PATIENCE=${Q_CONVERGENCE_PATIENCE:-5}
      - RL_BOUNDARY_PIPELINE=${RL_BOUNDARY_PIPELINE:-true}
      - RL_PHASE0_ROUNDS=${RL_PHASE0_ROUNDS:-20}
      - RL_QTABLE_MERGE=${RL_QTABLE_MERGE:-false}
      - RL_QTABLE_OVERLAY_SCENARIOS=${RL_QTABLE_OVERLAY_SCENARIOS:-}
      - DEFAULT_PROTOCOL=mqtt
      - MQTT_BROKER=${UNIFIED_FL_SERVER_HOST:-127.0.0.1}
      - AMQP_BROKER=${UNIFIED_FL_SERVER_HOST:-127.0.0.1}
      - AMQP_HOST=${UNIFIED_FL_SERVER_HOST:-127.0.0.1}
      - GRPC_HOST=${UNIFIED_FL_SERVER_HOST:-127.0.0.1}
      - GRPC_PORT=50051
      - QUIC_HOST=${UNIFIED_FL_SERVER_HOST:-127.0.0.1}
      - QUIC_PORT=4433
      - HTTP3_HOST=${UNIFIED_FL_SERVER_HOST:-127.0.0.1}
      - HTTP3_PORT=4434
      - USE_QUANTIZATION=${USE_QUANTIZATION:-false}
      - QUANTIZATION_BITS=${QUANTIZATION_BITS:-8}
      - QUANTIZATION_STRATEGY=${QUANTIZATION_STRATEGY:-ptq}
      # --- DDS (same as fl-client-dds-emotion-1) ---
      - DDS_PEER_SERVER=${DDS_PEER_SERVER:-192.168.0.102}
      - DDS_PEER_CLIENT1=${DDS_PEER_CLIENT1:-192.168.0.102}
      - DDS_PEER_CLIENT2=${DDS_PEER_CLIENT2:-192.168.0.100}
      - DDS_PEER_CLIENT3=${DDS_PEER_CLIENT3:-192.168.0.101}
      - DDS_SPDP_SERVER=${DDS_SPDP_SERVER:-}
      - DDS_SPDP_CLIENT1=${DDS_SPDP_CLIENT1:-}
      - DDS_SPDP_CLIENT2=${DDS_SPDP_CLIENT2:-}
      - DDS_SPDP_CLIENT3=${DDS_SPDP_CLIENT3:-}
      - DDS_DOMAIN_ID=0
    volumes:
      - ../Client/Emotion_Recognition:/app/Client/Emotion_Recognition
      - ../Network_Simulation:/app/Network_Simulation:ro
      - ../shared_data:/shared_data
      - ../experiment_results:/app/results
      - ../certs:/app/certs:ro
    depends_on:
      fl-server-unified-emotion:
        condition: service_started
      mqtt-broker-unified:
        condition: service_started
      amqp-broker-unified:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
    command: python3 Client/Emotion_Recognition/FL_Client_Unified.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']

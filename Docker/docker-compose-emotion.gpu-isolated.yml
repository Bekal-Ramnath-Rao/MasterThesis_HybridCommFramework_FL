# Docker Compose for Emotion Recognition with GPU Support (Device-Isolated)
# This version isolates GPU devices to prevent memory contention between clients.
# Requires: NVIDIA Container Toolkit.
#
# GPU assignment (single-GPU machine — all clients share GPU 0):
#   client-1 and client-2: device_ids ['0']  (adjust to ['1'] for a second physical GPU)
#   server: CPU only (CUDA_VISIBLE_DEVICES= empty)
#
# For lower DDS/HTTP3 latency (avoids bridge): use docker-compose-emotion.host-network.yml
# See Docker/README-host-network.md for port layout and QUIC buffer/GSO tuning.
#
# ---- 3-PC distributed setup (192.168.0.x network) ----
# PC1 (server + client1):  192.168.0.102  — runs this compose with --local-clients 1 --min-clients 3
# PC2 (client2, Windows):  192.168.0.100  — uses distributed_client_gui.py
# PC3 (client3, Linux):    192.168.0.101  — uses distributed_client_gui.py
#
# Mapped host ports for remote clients:
#   MQTT 31883 → broker:1883   AMQP 35672 → broker:5672
#   gRPC 50051/tcp   QUIC 4433/udp   HTTP/3 4434/udp
#   DDS: network_mode=host, UDP 7400-7500 + SPDP 7412/7414/7416/7418
#
# Before running on the server PC (for distributed mode):
#   export NUM_CLIENTS=3 MIN_CLIENTS=3
#   export DDS_PEER_SERVER=192.168.0.102 DDS_PEER_CLIENT1=192.168.0.102
#   export DDS_PEER_CLIENT2=192.168.0.100 DDS_PEER_CLIENT3=192.168.0.101

services:
  mqtt-broker:
    image: eclipse-mosquitto:latest
    ports:
      - "31883:1883"
      - "39001:9001"
    volumes:
      - ../mqtt-config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - emotion_network
    container_name: mqtt-broker

  # ============================================================================
  # MQTT Protocol Services
  # ============================================================================
  
  fl-server-mqtt-emotion:
    build:
      context: ..
      dockerfile: Server/Dockerfile
    environment:
      - PROTOCOL=MQTT
      - USE_CASE=emotion
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
      - NUM_ROUNDS=${NUM_ROUNDS:-1000}
      - NETWORK_SCENARIO=${NETWORK_SCENARIO:-default}
      - STOP_ON_CLIENT_CONVERGENCE=${STOP_ON_CLIENT_CONVERGENCE:-true}
      - TRAINING_TERMINATION_MODE=${TRAINING_TERMINATION_MODE:-}
      - FL_DIAGNOSTIC_PIPELINE=${FL_DIAGNOSTIC_PIPELINE:-0}
      - MIN_CLIENTS=${MIN_CLIENTS:-2}
      - MAX_CLIENTS=${MAX_CLIENTS:-100}
      - CUDA_VISIBLE_DEVICES=  # Server runs on CPU only (no GPU needed for aggregation)
      - USE_QUANTIZATION=${USE_QUANTIZATION:-false}
      - QUANTIZATION_STRATEGY=${QUANTIZATION_STRATEGY:-parameter_quantization}
      - QUANTIZATION_BITS=${QUANTIZATION_BITS:-8}
      - QUANTIZATION_SYMMETRIC=${QUANTIZATION_SYMMETRIC:-true}
      - QUANTIZATION_PER_CHANNEL=${QUANTIZATION_PER_CHANNEL:-false}
    cap_add:
      - NET_ADMIN
    volumes:
      - ../Server/Emotion_Recognition/packet_logger.db:/app/Server/Emotion_Recognition/packet_logger.db
    depends_on:
      - mqtt-broker
    networks:
      - emotion_network
    container_name: fl-server-mqtt-emotion
    command: python -u Server/Emotion_Recognition/FL_Server_MQTT.py
    # Server does not need GPU resources - only aggregates models

  fl-client-mqtt-emotion-1:
    build:
      context: ..
      dockerfile: Client/Dockerfile
    environment:
      - CLIENT_ID=1
      - NUM_CLIENTS=${NUM_CLIENTS:-2}
      - STOP_ON_CLIENT_CONVERGENCE=${STOP_ON_CLIENT_CONVERGENCE:-true}
      - TRAINING_TERMINATION_MODE=${TRAINING_TERMINATION_MODE:-}
      - FL_DIAGNOSTIC_PIPELINE=${FL_DIAGNOSTIC_PIPELINE:-0}
      - PROTOCOL=MQTT
      - USE_CASE=emotion
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
      - CUDA_VISIBLE_DEVICES=0
      - GPU_DEVICE_ID=0
      - TF_FORCE_GPU_ALLOW_GROWTH=true
      - TF_GPU_MEMORY_FRACTION=0.9
      - USE_QUANTIZATION=${USE_QUANTIZATION:-false}
      - QUANTIZATION_STRATEGY=${QUANTIZATION_STRATEGY:-parameter_quantization}
      - QUANTIZATION_BITS=${QUANTIZATION_BITS:-8}
      - QUANTIZATION_SYMMETRIC=${QUANTIZATION_SYMMETRIC:-true}
      - QUANTIZATION_PER_CHANNEL=${QUANTIZATION_PER_CHANNEL:-false}
    cap_add:
      - NET_ADMIN
    depends_on:
      - mqtt-broker
      - fl-server-mqtt-emotion
    networks:
      - emotion_network
    container_name: fl-client-mqtt-emotion-1
    command: python -u Client/Emotion_Recognition/FL_Client_MQTT.py
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
              device_ids: ['0']
    volumes:
